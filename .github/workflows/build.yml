name: Build mbew

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            ninja-build \
            pkg-config \
            yasm \
            nasm

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja nasm yasm pkg-config

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake ninja nasm yasm -y

      - name: Configure
        shell: bash
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/libmbew.dll artifacts/
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp build/libmbew.dylib artifacts/
          else
            cp build/libmbew.so artifacts/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbew-${{ runner.os }}
          path: artifacts/
