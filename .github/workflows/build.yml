name: Build mbew native libraries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: windows-x86_64

          - name: Linux x64
            os: ubuntu-22.04
            artifact: linux-x86_64

          - name: macOS x64
            os: macos-13
            artifact: macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      #
      # Dependencies
      #
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install ninja yasm pkgconfiglite -y
      
      
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            yasm \
            pkg-config
      
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            cmake \
            ninja \
            yasm \
            pkg-config

      #
      # Configure
      #
      - name: Configure CMake
        shell: bash
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release


      #
      # Build
      #
      - name: Build
        run: |
          cmake --build build --config Release


      #
      # Collect native library
      #
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p package

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            find build -name "mbew.dll" -exec cp {} package/ \;

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            find build -name "libmbew.dylib" -exec cp {} package/ \;

          else
            find build -name "libmbew.so" -exec cp {} package/ \;
          fi

          ls -la package


      #
      # Upload
      #
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbew-${{ matrix.artifact }}
          path: package/
